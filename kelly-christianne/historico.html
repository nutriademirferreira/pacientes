<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F4EFE4;font-family:'Jost',sans-serif;padding:32px 16px}
.wrap{max-width:640px;margin:0 auto}
.header{background:#536147;border-radius:12px 12px 0 0;padding:28px 32px}

.item-data{font-size:11px;color:#B8956A;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.item-titulo{font-size:14px;color:#536147;font-weight:500}
.item-desc{font-size:12px;color:#706B63;margin-top:2px}
.badge-atual{font-size:10px;background:#EAF3DE;color:#3B6D11;padding:4px 10px;border-radius:20px;font-weight:600;letter-spacing:.06em}
.badge-antigo{font-size:10px;background:#F4EFE4;color:#706B63;padding:4px 10px;border-radius:20px;font-weight:600}
.voltar{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#706B63;margin-top:20px;text-decoration:none}
.voltar:hover{color:#536147}

</head>
<body>
<div class="wrap">
